syntax = "proto3";

package admin;

option go_package = "internal/gen/admin";

service AdminService {
    rpc RegisterSite (RegisterSiteRequest) returns (RegisterSiteResponse);

    rpc GetValidSites (GetValidSitesRequest) returns (GetValidSitesResponse);
}

message RegisterSiteRequest {
    string name = 1;
}

message RegisterSiteResponse {
    string site_id = 1;
    string api_key = 2;
}

message GetValidSitesRequest {}

message GetValidSitesResponse {
    repeated string site_ids = 1;
}