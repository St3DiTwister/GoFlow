apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  # ClickHouse
  CH_USER: "admin"
  CH_PASSWORD: "admin"
  CH_DB: "goflow"
  CH_ADDR: "clickhouse:9000"
  # Kafka
  KAFKA_BROKER: "kafka:9092"
  KAFKA_TOPIC: "telemetry"
  # PostgreSQL
  PG_USER: "admin"
  PG_PASSWORD: "admin"
  PG_DB: "goflow"
  PG_PORT: "5432"
  PG_HOST: "postgres"
  PG_SSLMODE: "disable"
  # Services
  ADMIN_GRPC_PORT: "50051"
  ADMIN_HTTP_PORT: "8082"
  ADMIN_GRPC_ADDR: "admin-service:50051"
  WORKER_METRICS_PORT: "8081"
  APP_PORT: "8080"
  # Monitoring
  LOKI_ADDR: "http://loki:3100/loki/api/v1/push"