name: goflow

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: goflow-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - goflow-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: goflow-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - goflow-net

  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    container_name: goflow-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_USER: ${CH_USER}
      CLICKHOUSE_PASSWORD: ${CH_PASSWORD}
      CLICKHOUSE_DB: ${CH_DB}
    networks:
      - goflow-net
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: goflow-kafka-ui
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka
    networks:
      - goflow-net

  postgres:
    image: postgres:15-alpine
    container_name: goflow-postgres
    restart: unless-stopped
    ports:
      - "${PG_PORT}:5432"
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - goflow-net

  prometheus:
    image: prom/prometheus:latest
    container_name: goflow-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - goflow-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  loki:
    image: grafana/loki:latest
    container_name: goflow-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - goflow-net

  alloy:
    image: grafana/alloy:latest
    container_name: goflow-alloy
    volumes:
      - ./alloy-config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    depends_on:
      - loki
    networks:
      - goflow-net

  grafana:
    image: grafana/grafana:latest
    container_name: goflow-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
      - loki
    networks:
      - goflow-net

  admin-service:
    build:
      context: ..
      dockerfile: deployments/admin.Dockerfile
    container_name: goflow-admin
    environment:
      - PG_USER=${PG_USER}
      - PG_PASSWORD=${PG_PASSWORD}
      - PG_DB=${PG_DB}
      - PG_PORT=5432
      - ADMIN_GRPC_PORT=50051
      - ADMIN_HTTP_PORT=8082
    ports:
      - "50051:50051"
      - "8082:8082"
    depends_on:
      - postgres
    networks:
      - goflow-net

  worker:
    build:
      context: ..
      dockerfile: deployments/worker.Dockerfile
    container_name: goflow-worker
    environment:
      - KAFKA_BROKER=${KAFKA_BROKER}
      - KAFKA_TOPIC=${KAFKA_TOPIC}
      - CH_ADDR=${CH_ADDR}
      - ADMIN_GRPC_ADDR=${ADMIN_GRPC_ADDR}
      - WORKER_METRICS_PORT=${WORKER_METRICS_PORT}
      - CH_USER=${CH_USER}
      - CH_PASSWORD=${CH_PASSWORD}
      - CH_DB=${CH_DB}
    depends_on:
      - kafka
      - admin-service
    networks:
      - goflow-net

  gateway:
    build:
      context: ..
      dockerfile: deployments/gateway.Dockerfile
    container_name: goflow-gateway
    ports:
      - "80:8080"
    environment:
      - KAFKA_BROKERS=kafka:29092
      - ADMIN_GRPC_ADDR=admin-service:50051
      - APP_PORT=8080
    depends_on:
      - kafka
      - admin-service
    networks:
      - goflow-net
